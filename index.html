<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasil Pengeluaran - Firebase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        orbitron: ['Orbitron', 'monospace'],
                        poppins: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #000;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .video-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            object-fit: cover;
            filter: brightness(1.4) contrast(1.05);
        }
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.04) 50%, rgba(0,0,0,0.12) 100%);
            z-index: 1;
        }

        .particle {
            position: fixed;
            width: 3px; height: 3px;
            background: #D4AF37;
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
            opacity: 0;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            10%  { opacity: 0.55; }
            90%  { opacity: 0.1; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        .main-wrap {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            gap: 1.5rem;
        }

        .card {
            background: linear-gradient(145deg, rgba(8,8,22,0.78), rgba(4,4,12,0.85));
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 1.25rem;
            backdrop-filter: blur(22px);
            box-shadow: 0 4px 32px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.05);
            opacity: 0;
            transform: translateY(28px);
            animation: cardIn 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
        }
        .card-delay { animation-delay: 0.18s; }

        @keyframes cardIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .result-num {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            letter-spacing: 0.18em;
            color: #FFD700;
            text-shadow: 0 0 14px rgba(255,215,0,0.5), 0 0 30px rgba(255,215,0,0.2), 0 2px 6px rgba(0,0,0,0.7);
            transition: all 0.3s ease;
        }
        .result-num.pulse {
            animation: numPulse 0.5s ease;
        }
        @keyframes numPulse {
            0%   { text-shadow: 0 0 14px rgba(255,215,0,0.5), 0 2px 6px rgba(0,0,0,0.7); }
            50%  { text-shadow: 0 0 30px rgba(255,215,0,0.9), 0 0 50px rgba(255,215,0,0.3), 0 2px 6px rgba(0,0,0,0.7); }
            100% { text-shadow: 0 0 14px rgba(255,215,0,0.5), 0 2px 6px rgba(0,0,0,0.7); }
        }

        .shio-badge {
            background: linear-gradient(135deg, rgba(212,175,55,0.22), rgba(212,175,55,0.08));
            border: 1px solid rgba(212,175,55,0.45);
            border-radius: 0.45rem;
            padding: 0.1rem 0.65rem;
            color: #FFD700;
            font-weight: 600;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            transition: all 0.3s ease;
            text-shadow: 0 1px 4px rgba(0,0,0,0.6);
        }

        .shimmer-text {
            background: linear-gradient(90deg, #D4AF37 0%, #FFD700 25%, #fff 50%, #FFD700 75%, #D4AF37 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s ease-in-out infinite;
            filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6));
        }
        @keyframes shimmer {
            0%, 100% { background-position: 200% 0; }
            50% { background-position: -200% 0; }
        }

        .gold-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212,175,55,0.4), transparent);
        }

        .field-label {
            color: rgba(212,175,55,0.8);
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 0.3rem;
            display: block;
        }
        .inp {
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(212,175,55,0.2);
            border-radius: 0.65rem;
            padding: 0.7rem 0.9rem;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            width: 100%;
            outline: none;
            transition: all 0.3s ease;
        }
        .inp:focus {
            border-color: rgba(212,175,55,0.6);
            box-shadow: 0 0 14px rgba(212,175,55,0.15);
            background: rgba(0,0,0,0.45);
        }
        .inp::placeholder { color: rgba(255,255,255,0.3); }
        .inp-mono { font-family: 'Orbitron', monospace; letter-spacing: 0.12em; }

        .btn-gold {
            background: linear-gradient(135deg, #D4AF37, #B8960F);
            color: #000;
            font-weight: 700;
            padding: 0.7rem 1.3rem;
            border-radius: 0.65rem;
            border: none;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            transition: all 0.3s ease;
        }
        .btn-gold:hover {
            background: linear-gradient(135deg, #FFD700, #D4AF37);
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(212,175,55,0.35);
        }
        .btn-gold:active { transform: translateY(0); }
        .btn-gold:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-ghost {
            background: rgba(0,0,0,0.25);
            color: #D4AF37;
            border: 1px solid rgba(212,175,55,0.35);
            padding: 0.7rem 1.3rem;
            border-radius: 0.65rem;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            transition: all 0.3s ease;
        }
        .btn-ghost:hover {
            background: rgba(212,175,55,0.08);
            border-color: rgba(212,175,55,0.65);
            transform: translateY(-2px);
        }

        .btn-icon {
            background: rgba(0,0,0,0.25);
            color: rgba(212,175,55,0.6);
            border: 1px solid rgba(212,175,55,0.25);
            width: 2.6rem; height: 2.6rem;
            border-radius: 0.65rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 0.85rem;
        }
        .btn-icon:hover {
            color: #FFD700;
            border-color: rgba(212,175,55,0.5);
            background: rgba(212,175,55,0.08);
        }

        .edit-shio-btn {
            color: rgba(212,175,55,0.45);
            cursor: pointer;
            transition: color 0.25s;
            font-size: 0.7rem;
            margin-left: 0.3rem;
        }
        .edit-shio-btn:hover { color: #FFD700; }

        .modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            backdrop-filter: blur(6px);
        }
        .modal-bg.open { display: flex; animation: fadeIn 0.25s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-box {
            background: linear-gradient(145deg, #12122a, #08081a);
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 1.25rem;
            max-width: 680px;
            width: 100%;
            max-height: 82vh;
            overflow-y: auto;
            animation: modalPop 0.35s cubic-bezier(0.16,1,0.3,1);
        }
        @keyframes modalPop {
            from { transform: scale(0.92) translateY(16px); opacity: 0; }
            to   { transform: scale(1) translateY(0); opacity: 1; }
        }

        .s-table { width: 100%; border-collapse: separate; border-spacing: 0; }
        .s-table th {
            background: rgba(212,175,55,0.12);
            color: #FFD700;
            padding: 0.65rem 0.9rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .s-table td {
            padding: 0.45rem 0.9rem;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            color: #d0d0d0;
            font-size: 0.85rem;
            vertical-align: middle;
        }
        .s-table tr:hover td { background: rgba(212,175,55,0.04); }
        .s-table .s-name { color: #FFD700; font-weight: 600; white-space: nowrap; }
        .s-inp {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(212,175,55,0.18);
            border-radius: 0.4rem;
            padding: 0.35rem 0.55rem;
            color: #fff;
            font-family: 'Orbitron', monospace;
            font-size: 0.75rem;
            width: 100%;
            outline: none;
            transition: all 0.3s ease;
        }
        .s-inp:focus {
            border-color: rgba(212,175,55,0.55);
            box-shadow: 0 0 8px rgba(212,175,55,0.12);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, #D4AF37, #B8960F);
            color: #000;
            padding: 0.7rem 1.4rem;
            border-radius: 0.65rem;
            font-weight: 600;
            font-size: 0.85rem;
            z-index: 200;
            transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0,0,0,0.3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .status-online { background: rgba(34,197,94,0.2); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); }
        .status-offline { background: rgba(239,68,68,0.2); color: #f87171; border: 1px solid rgba(248,113,113,0.3); }
        .status-saved { background: rgba(212,175,55,0.2); color: #FFD700; border: 1px solid rgba(212,175,55,0.3); }

        @media (max-width: 640px) {
            .result-num { font-size: 1.35rem !important; }
            .toast { white-space: normal; font-size: 0.75rem; max-width: 90%; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
            .particle { display: none; }
        }
    </style>
</head>
<body>

    <video class="video-bg" autoplay muted loop playsinline>
        <source src="https://i.imgur.com/XCxsBgy.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <main class="main-wrap">
        <!-- Kartu Hasil -->
        <section class="card w-full max-w-lg px-7 py-8">
            <div class="text-center mb-5">
                <p class="text-xs font-semibold tracking-[0.28em] uppercase mb-1.5 sub-title">Hasil Pengeluaran</p>
                <h1 id="dPasaran" class="font-orbitron text-2xl sm:text-3xl font-black tracking-wider pasaran-title">-</h1>
            </div>
            <div class="gold-line mb-5"></div>
            <p id="dDate" class="text-center text-sm mb-5 date-text">-</p>

            <div class="space-y-3.5">
                <div class="flex items-center justify-between flex-wrap gap-y-1 gap-x-2">
                    <span class="text-sm font-medium res-label">Result 1 :</span>
                    <div class="flex items-center gap-2 flex-wrap">
                        <span id="dR1" class="result-num text-xl sm:text-2xl">-</span>
                        <span class="text-sm res-label">, SHIO :</span>
                        <span id="dShio" class="shio-badge">
                            <i class="fa-solid fa-paw" style="font-size:0.65rem;"></i>
                            <span>-</span>
                        </span>
                        <button class="edit-shio-btn" onclick="openShioModal()" title="Edit Tabel Shio">
                            <i class="fa-solid fa-pen-to-square"></i>
                        </button>
                    </div>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-sm font-medium res-label">Result 2 :</span>
                    <span id="dR2" class="result-num text-xl sm:text-2xl">-</span>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-sm font-medium res-label">Result 3 :</span>
                    <span id="dR3" class="result-num text-xl sm:text-2xl">-</span>
                </div>
            </div>

            <div class="gold-line mt-6 mb-5"></div>
            <p class="shimmer-text text-center text-sm font-bold tracking-wide">Selamat Kepada Pemenang, Salam JP</p>
        </section>

        <!-- Panel Input -->
        <section class="card card-delay w-full max-w-lg px-6 py-5">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-sm font-semibold tracking-wider uppercase flex items-center gap-2" style="color:rgba(255,255,255,0.85);">
                    <i class="fa-solid fa-sliders" style="color:#D4AF37;"></i>
                    Pengaturan
                </h2>
                <div id="connectionStatus" class="status-badge status-offline text-xs">
                    <i class="fa-solid fa-circle"></i>
                    <span>Offline</span>
                </div>
            </div>

            <div class="space-y-3.5">
                <div>
                    <label class="field-label" for="iPasaran">Nama Pasaran</label>
                    <input id="iPasaran" type="text" class="inp" placeholder="Contoh: BANGKOK 0130" oninput="onDataChange()">
                </div>
                <div>
                    <label class="field-label" for="iDate">Tanggal</label>
                    <input id="iDate" type="date" class="inp" onchange="onDataChange()">
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                    <div>
                        <label class="field-label" for="iR1">Result 1</label>
                        <input id="iR1" type="text" class="inp inp-mono" placeholder="1234" maxlength="4" oninput="numOnly(this); onDataChange()">
                    </div>
                    <div>
                        <label class="field-label" for="iR2">Result 2</label>
                        <input id="iR2" type="text" class="inp inp-mono" placeholder="5841" maxlength="4" oninput="numOnly(this); onDataChange()">
                    </div>
                    <div>
                        <label class="field-label" for="iR3">Result 3</label>
                        <input id="iR3" type="text" class="inp inp-mono" placeholder="4474" maxlength="4" oninput="numOnly(this); onDataChange()">
                    </div>
                </div>
                <div class="flex gap-2.5 pt-1.5">
                    <button id="saveBtn" class="btn-gold flex-1" onclick="saveToFirebase()">
                        <i class="fa-solid fa-floppy-disk"></i> <span id="saveBtnText">Simpan</span>
                    </button>
                    <button class="btn-ghost flex-1" onclick="openShioModal()">
                        <i class="fa-solid fa-table-list"></i> Edit Shio
                    </button>
                    <button class="btn-icon" onclick="resetAll()" title="Reset semua">
                        <i class="fa-solid fa-rotate-left"></i>
                    </button>
                </div>
                <div class="flex gap-2">
                    <button class="btn-ghost flex-1" onclick="copyResult()">
                        <i class="fa-solid fa-copy"></i> Salin Hasil
                    </button>
                    <button class="btn-ghost flex-1" onclick="loadFromFirebase()">
                        <i class="fa-solid fa-cloud-arrow-down"></i> Muat Ulang
                    </button>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal Edit Shio -->
    <div id="shioModal" class="modal-bg" onclick="closeShioModal(event)">
        <div class="modal-box px-6 py-5" onclick="event.stopPropagation()">
            <div class="flex items-center justify-between mb-5">
                <h2 class="font-bold text-lg flex items-center gap-2" style="color:#FFD700;">
                    <i class="fa-solid fa-paw"></i> Tabel Shio
                </h2>
                <button onclick="closeShioModal()" class="text-xl transition-colors" style="color:rgba(255,255,255,0.35);" aria-label="Tutup modal">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <p class="text-xs mb-4" style="color:rgba(255,255,255,0.4);">Edit nomor untuk setiap shio (2 digit terakhir result). Pisahkan dengan koma.</p>

            <div class="overflow-x-auto rounded-lg" style="border:1px solid rgba(255,255,255,0.06);">
                <table class="s-table">
                    <thead><tr><th>Shio</th><th>Nomor (2 digit)</th></tr></thead>
                    <tbody id="shioTbody"></tbody>
                </table>
            </div>

            <div class="flex gap-2.5 mt-5">
                <button class="btn-gold flex-1" onclick="saveShio()">
                    <i class="fa-solid fa-check"></i> Simpan
                </button>
                <button class="btn-ghost" onclick="resetShioDefault()">
                    <i class="fa-solid fa-rotate-left"></i> Default
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">
        <i class="fa-solid fa-circle-check"></i>
        <span id="toastMsg">Berhasil!</span>
    </div>

    <script>
    // =====================================================
    //  🔥 KONFIGURASI FIREBASE
    // =====================================================
    // ⚠️ GANTI DENGAN KONFIGURASI FIREBASE ANDA ⚠️
    const firebaseConfig = {
  apiKey: "AIzaSyDUz5JUyhW5CX38mleMv__POsSD5oOLnmg",
  authDomain: "tabungan-saya.firebaseapp.com",
  databaseURL: "https://tabungan-saya-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "tabungan-saya",
  storageBucket: "tabungan-saya.firebasestorage.app",
  messagingSenderId: "227780626177",
  appId: "1:227780626177:web:1e8c2e93cdeb8c1fb73d00",
  measurementId: "G-135CPSCREP"
};

    // Inisialisasi Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const dbRef = database.ref('pengeluaran/data');
    const shioRef = database.ref('pengeluaran/shio');

    // =====================================================
    //  DATA SHIO DEFAULT
    // =====================================================
    const DEFAULT_SHIO = {
        'Kuda':     [1,13,25,37,49,61,73,85,97],
        'Ular':     [2,14,26,38,50,62,74,86,98],
        'Naga':     [3,15,27,39,51,63,75,87,99],
        'Kelinci':  [4,16,28,40,52,64,76,88,0],
        'Harimau':  [5,17,29,41,53,65,77,89],
        'Kerbau':   [6,18,30,42,54,66,78,90],
        'Tikus':    [7,19,31,43,55,67,79,91],
        'Babi':     [8,20,32,44,56,68,80,92],
        'Anjing':   [9,21,33,45,57,69,81,93],
        'Ayam':     [10,22,34,46,58,70,82,94],
        'Monyet':   [11,23,35,47,59,71,83,95],
        'Kambing':  [12,24,36,48,60,72,84,96]
    };

    let shioData = JSON.parse(JSON.stringify(DEFAULT_SHIO));
    let currentData = {
        pasaran: '',
        date: '',
        r1: '',
        r2: '',
        r3: ''
    };
    let isSaving = false;
    let autoSaveTimer = null;
    let isOnline = navigator.onLine;

    const HARI  = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
    const BULAN = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

    // =====================================================
    //  FUNGSI UTILITY
    // =====================================================
    function fmtTanggal(str) {
        if (!str) return '-';
        const d = new Date(str + 'T00:00:00');
        if (isNaN(d.getTime())) return '-';
        return `Hari ${HARI[d.getDay()]}, ${d.getDate()} ${BULAN[d.getMonth()]} ${d.getFullYear()}`;
    }

    function cariShio(val) {
        if (!val) return '';
        const n = parseInt(String(val).slice(-2), 10);
        for (const [nama, arr] of Object.entries(shioData)) {
            if (arr.includes(n)) return nama;
        }
        return '';
    }

    function numOnly(el) { el.value = el.value.replace(/[^0-9]/g, ''); }

    let prevR1 = '', prevR2 = '', prevR3 = '';

    function updateDisplay() {
        const r1 = currentData.r1 || '';
        const r2 = currentData.r2 || '';
        const r3 = currentData.r3 || '';
        const shio = cariShio(r1);

        document.getElementById('dPasaran').textContent = currentData.pasaran || '-';
        document.getElementById('dDate').textContent = fmtTanggal(currentData.date);
        document.getElementById('dR1').textContent = r1 || '-';
        document.getElementById('dR2').textContent = r2 || '-';
        document.getElementById('dR3').textContent = r3 || '-';

        document.getElementById('dShio').innerHTML = `<i class="fa-solid fa-paw" style="font-size:0.65rem;"></i><span>${shio || '-'}</span>`;

        pulseIfChanged('dR1', r1, prevR1);
        pulseIfChanged('dR2', r2, prevR2);
        pulseIfChanged('dR3', r3, prevR3);
        prevR1 = r1; prevR2 = r2; prevR3 = r3;
    }

    function pulseIfChanged(id, curr, prev) {
        if (curr && curr !== prev) {
            const el = document.getElementById(id);
            if (el) {
                el.classList.remove('pulse');
                void el.offsetWidth;
                el.classList.add('pulse');
            }
        }
    }

    function syncInputsToData() {
        currentData.pasaran = document.getElementById('iPasaran').value;
        currentData.date = document.getElementById('iDate').value;
        currentData.r1 = document.getElementById('iR1').value;
        currentData.r2 = document.getElementById('iR2').value;
        currentData.r3 = document.getElementById('iR3').value;
        updateDisplay();
    }

    function syncDataToInputs() {
        document.getElementById('iPasaran').value = currentData.pasaran || '';
        document.getElementById('iDate').value = currentData.date || '';
        document.getElementById('iR1').value = currentData.r1 || '';
        document.getElementById('iR2').value = currentData.r2 || '';
        document.getElementById('iR3').value = currentData.r3 || '';
        updateDisplay();
    }

    function onDataChange() {
        syncInputsToData();
        if (autoSaveTimer) clearTimeout(autoSaveTimer);
        autoSaveTimer = setTimeout(() => {
            if (!isSaving && isOnline) {
                saveToFirebase();
            }
        }, 1500);
    }

    // =====================================================
    //  FUNGSI FIRESTORE (REALTIME DATABASE)
    // =====================================================
    function updateConnectionStatus(online) {
        isOnline = online;
        const statusEl = document.getElementById('connectionStatus');
        const saveBtn = document.getElementById('saveBtn');
        
        if (online) {
            statusEl.className = 'status-badge status-online';
            statusEl.innerHTML = '<i class="fa-solid fa-circle"></i><span>Online</span>';
            if (saveBtn) saveBtn.disabled = false;
        } else {
            statusEl.className = 'status-badge status-offline';
            statusEl.innerHTML = '<i class="fa-solid fa-circle"></i><span>Offline (Local)</span>';
            if (saveBtn) saveBtn.disabled = false; // Tetap bisa simpan (akan sync saat online)
        }
    }

    // Load data dari Firebase
    async function loadFromFirebase() {
        try {
            showToast('🔄 Memuat data dari server...');
            
            // Load data utama
            const snapshot = await dbRef.once('value');
            if (snapshot.exists()) {
                currentData = snapshot.val();
                syncDataToInputs();
                showToast('✅ Data berhasil dimuat dari server');
            } else {
                // Set default data jika kosong
                const today = new Date();
                currentData = {
                    pasaran: 'BANGKOK 0130',
                    date: `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`,
                    r1: '',
                    r2: '',
                    r3: ''
                };
                syncDataToInputs();
                showToast('📝 Data kosong, gunakan default');
            }
            
            // Load data shio
            const shioSnapshot = await shioRef.once('value');
            if (shioSnapshot.exists()) {
                shioData = shioSnapshot.val();
            } else {
                shioData = JSON.parse(JSON.stringify(DEFAULT_SHIO));
                await shioRef.set(shioData);
            }
            
            updateDisplay();
        } catch (error) {
            console.error('Error loading data:', error);
            showToast('❌ Gagal memuat data: ' + error.message);
        }
    }

    // Simpan data ke Firebase
    async function saveToFirebase() {
        if (isSaving) return;
        
        if (!isOnline) {
            showToast('⚠️ Anda offline, data akan disimpan saat online kembali');
            // Simpan ke localStorage sebagai cache
            localStorage.setItem('pendingData', JSON.stringify(currentData));
            localStorage.setItem('pendingShio', JSON.stringify(shioData));
            return;
        }
        
        isSaving = true;
        const saveBtn = document.getElementById('saveBtn');
        const saveBtnText = document.getElementById('saveBtnText');
        
        if (saveBtn) {
            saveBtn.disabled = true;
            saveBtnText.innerHTML = '<span class="loading-spinner"></span> Menyimpan...';
        }
        
        try {
            await dbRef.set(currentData);
            await shioRef.set(shioData);
            
            // Hapus pending data jika ada
            localStorage.removeItem('pendingData');
            localStorage.removeItem('pendingShio');
            
            showToast('💾 Data berhasil disimpan ke cloud!');
            
            // Update status button
            if (saveBtn) {
                saveBtnText.innerHTML = '<i class="fa-regular fa-circle-check"></i> Tersimpan';
                setTimeout(() => {
                    if (saveBtnText) saveBtnText.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Simpan';
                    saveBtn.disabled = false;
                }, 2000);
            }
        } catch (error) {
            console.error('Error saving data:', error);
            showToast('❌ Gagal menyimpan: ' + error.message);
            if (saveBtn) {
                saveBtnText.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Simpan';
                saveBtn.disabled = false;
            }
        } finally {
            isSaving = false;
        }
    }

    // Sync pending data saat online kembali
    async function syncPendingData() {
        const pendingData = localStorage.getItem('pendingData');
        const pendingShio = localStorage.getItem('pendingShio');
        
        if (pendingData || pendingShio) {
            showToast('🔄 Menyinkronkan data yang tertunda...');
            try {
                if (pendingData) {
                    const data = JSON.parse(pendingData);
                    await dbRef.set(data);
                    currentData = data;
                    syncDataToInputs();
                }
                if (pendingShio) {
                    const shio = JSON.parse(pendingShio);
                    await shioRef.set(shio);
                    shioData = shio;
                }
                localStorage.removeItem('pendingData');
                localStorage.removeItem('pendingShio');
                showToast('✅ Sinkronisasi berhasil!');
            } catch (error) {
                console.error('Sync error:', error);
            }
        }
    }

    // =====================================================
    //  FUNGSI SHIO
    // =====================================================
    function renderShioTable() {
        const tbody = document.getElementById('shioTbody');
        tbody.innerHTML = '';
        for (const [nama, arr] of Object.entries(shioData)) {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="s-name">${nama}</td>
                           <td><input type="text" class="s-inp" data-shio="${nama}"
                               value="${arr.map(n => String(n).padStart(2,'0')).join(', ')}"></td>`;
            tbody.appendChild(tr);
        }
    }

    async function saveShio() {
        const inputs = document.querySelectorAll('.s-inp');
        const newData = {};
        inputs.forEach(inp => {
            const nama = inp.dataset.shio;
            const nums = inp.value.split(',').map(s => s.trim()).filter(s => s !== '').map(s => parseInt(s, 10) % 100);
            newData[nama] = nums;
        });
        shioData = newData;
        
        if (isOnline) {
            try {
                await shioRef.set(shioData);
                showToast('💾 Tabel shio tersimpan!');
            } catch (error) {
                showToast('⚠️ Tersimpan lokal, akan sync saat online');
                localStorage.setItem('pendingShio', JSON.stringify(shioData));
            }
        } else {
            localStorage.setItem('pendingShio', JSON.stringify(shioData));
            showToast('📱 Tersimpan lokal (offline)');
        }
        
        updateDisplay();
        closeShioModal();
    }

    function resetShioDefault() {
        shioData = JSON.parse(JSON.stringify(DEFAULT_SHIO));
        renderShioTable();
        updateDisplay();
        showToast('Tabel shio direset ke default (belum tersimpan)');
    }

    // =====================================================
    //  FUNGSI UI LAINNYA
    // =====================================================
    function generateText() {
        const shio = cariShio(currentData.r1);
        return `Hasil Pengeluaran ${currentData.pasaran || '-'}\n${fmtTanggal(currentData.date)}\nResult 1 : ${currentData.r1 || '-'}, SHIO : ${shio}\nResult 2 : ${currentData.r2 || '-'}\nResult 3 : ${currentData.r3 || '-'}\nSelamat Kepada Pemenang, Salam JP`;
    }

    async function copyResult() {
        const text = generateText();
        try {
            await navigator.clipboard.writeText(text);
            showToast('📋 Berhasil disalin ke clipboard!');
        } catch {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showToast('📋 Berhasil disalin!');
        }
    }

    function resetAll() {
        currentData = {
            pasaran: '',
            date: new Date().toISOString().split('T')[0],
            r1: '',
            r2: '',
            r3: ''
        };
        syncDataToInputs();
        showToast('🔄 Semua input direset (belum tersimpan)');
    }

    function openShioModal() {
        renderShioTable();
        document.getElementById('shioModal').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeShioModal(e) {
        if (e && e.target !== e.currentTarget) return;
        document.getElementById('shioModal').classList.remove('open');
        document.body.style.overflow = '';
    }

    let toastTimer;
    function showToast(msg) {
        const el = document.getElementById('toast');
        document.getElementById('toastMsg').textContent = msg;
        el.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
    }

    function spawnParticles() {
        for (let i = 0; i < 22; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = 2 + Math.random() * 3;
            p.style.cssText = `left:${Math.random()*100}vw;width:${size}px;height:${size}px;animation-duration:${9+Math.random()*14}s;animation-delay:${Math.random()*12}s;`;
            document.body.appendChild(p);
        }
    }

    // =====================================================
    //  EVENT LISTENER & INIT
    // =====================================================
    window.addEventListener('online', () => {
        updateConnectionStatus(true);
        syncPendingData();
        showToast('🌐 Kembali online!');
    });
    
    window.addEventListener('offline', () => {
        updateConnectionStatus(false);
        showToast('⚠️ Anda offline, data disimpan lokal');
    });

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeShioModal();
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
            e.preventDefault();
            saveToFirebase();
        }
    });

    // Inisialisasi
    spawnParticles();
    updateConnectionStatus(navigator.onLine);
    
    // Load data dari Firebase
    loadFromFirebase();
    </script>
</body>
</html>
